<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Village - Vue Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0f172a;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="vue-app"></div>
  <script type="module">
    import { createVueApp } from './ux/main.js'

    // Lightweight mock engine for manual visual testing.
    const mockEngine = {
      update: () => ({
        village: { day: 12, gold: 340, population: 5, wood: 80 },
        heroes: [{ id: 'h1', name: 'Elena' }, { id: 'h2', name: 'Bran' }],
        inventory: {},
        expeditions: []
      }),
      initialize: () => {},
      advanceDay: () => {},
      i18n: {
        t: (key) => key,
        setLanguage: () => true,
        getCurrentLanguage: () => 'en'
      }
    }

    const mockPersistence = {
      slotIndex: 0,
      setSlot: (index) => { mockPersistence.slotIndex = index },
      clearSlot: () => { mockPersistence.slotIndex = null }
    }

    const mockSaveSlotManager = {
      listSlots: () => [
        { index: 0, exists: true, day: 12, lastPlayedAt: new Date().toISOString() },
        { index: 1, exists: false },
        { index: 2, exists: false }
      ],
      createSlot: () => {},
      deleteSlot: () => {}
    }

    createVueApp({
      engine: mockEngine,
      persistence: mockPersistence,
      saveSlotManager: mockSaveSlotManager,
      container: document.getElementById('vue-app')
    })
  </script>
</body>
</html>
