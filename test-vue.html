<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RPG Village - Vue Test</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      background: #0f172a;
      min-height: 100vh;
    }
  </style>
</head>
<body>
  <div id="vue-app"></div>
  <script type="module">
    import { createVueApp } from './ux/main.js'

    // Lightweight mock engine for manual visual testing.
    const mockEngine = {
      update: () => ({
        village: {
          day: 12,
          gold: 340,
          population: 5,
          wood: 80,
          infrastructure: { tavern: 1 }
        },
        heroes: [
          {
            id: 'h1',
            name: 'Elena',
            level: 5,
            origin: 'origin_warrior',
            activity: 'idle',
            exp: 120,
            statPoints: 3,
            skillPoints: 1,
            hp: 55, maxHp: 55,
            mp: 21, maxMp: 21,
            stamina: 14, maxStamina: 14,
            strength: 13,
            speed: 7,
            defense: 9,
            magicPower: 5,
            mealBuffs: []
          },
          {
            id: 'h2',
            name: 'Bran',
            level: 4,
            origin: 'origin_thief',
            activity: 'expedition',
            exp: 85,
            statPoints: 0,
            skillPoints: 0,
            hp: 48, maxHp: 48,
            mp: 19, maxMp: 19,
            stamina: 12, maxStamina: 12,
            strength: 10,
            speed: 11,
            defense: 6,
            magicPower: 5,
            mealBuffs: [{ stat: 'speed', value: 2, battlesRemaining: 2 }]
          }
        ],
        inventory: {},
        expeditions: []
      }),
      initialize: () => {},
      advanceDay: () => {},
      i18n: {
        t: (key, params = {}) => {
          if (key === 'heroes_uxelm_stat_point_available' && params) return `Unassigned Stat Points: ${params.amount}`
          if (key === 'heroes_uxelm_skill_point' && params) return `Skill Points: ${params.amount}`
          if (key === 'heroes_info_origin_warrior') return 'Warrior'
          if (key === 'heroes_info_origin_warrior_desc') return '+10% Defense, +5% Max HP'
          if (key === 'heroes_info_origin_thief') return 'Thief'
          if (key === 'heroes_info_origin_thief_desc') return '+10% Speed | Party: +10% Gold Gain'
          return key
        },
        setLanguage: () => true,
        getCurrentLanguage: () => 'en'
      }
    }

    const mockPersistence = {
      slotIndex: 0,
      setSlot: (index) => { mockPersistence.slotIndex = index },
      clearSlot: () => { mockPersistence.slotIndex = null }
    }

    const mockSaveSlotManager = {
      listSlots: () => [
        { index: 0, exists: true, day: 12, lastPlayedAt: new Date().toISOString() },
        { index: 1, exists: false },
        { index: 2, exists: false }
      ],
      createSlot: () => {},
      deleteSlot: () => {}
    }

    createVueApp({
      engine: mockEngine,
      persistence: mockPersistence,
      saveSlotManager: mockSaveSlotManager,
      container: document.getElementById('vue-app')
    })
  </script>
</body>
</html>
