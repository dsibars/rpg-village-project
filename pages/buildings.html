<section id="buildings-view" class="domain-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab active" data-subview="buildings" data-i18n="shared_uxelm_nav_buildings"></button>
        <button class="sub-nav-tab" data-subview="shop" data-i18n="shared_uxelm_nav_shop"></button>
        <button class="sub-nav-tab" data-subview="forge" data-i18n="shared_uxelm_nav_forge"></button>
        <button class="sub-nav-tab" data-subview="inventory" data-i18n="shared_uxelm_nav_inventory"></button>
        <button class="sub-nav-tab" data-subview="settings" data-i18n="shared_uxelm_nav_settings"></button>
    </div>
    <div class="view-header">
        <h2 data-i18n="shared_uxelm_nav_buildings"></h2>
    </div>
    <div class="master-detail-layout">
        <!-- Master Pane: List of Buildings -->
        <aside class="master-pane card">
            <div class="pane-header">
                <h3 data-i18n="village_uxelm_building_available"></h3>
            </div>
            <div id="buildings-list-container" class="list-container">
                <!-- Building cards will be injected here -->
            </div>
        </aside>

        <!-- Detail Pane: Building Information & Actions -->
        <main class="detail-pane card glass-pane">
            <div id="building-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">⚒️</div>
                    <p data-i18n="village_uxelm_building_select"></p>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for a building card (injected via JS) -->
    <template id="tpl-building-card">
        <div class="list-item building-card" data-id="">
            <div class="list-item-header">
                <span class="list-item-title"></span>
                <span class="list-item-level"></span>
            </div>
            <div class="progress-container hidden">
                <div class="progress-bar warning" style="width: 0%"></div>
            </div>
        </div>
    </template>
</section>
