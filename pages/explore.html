<section id="explore-view" class="domain-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab active" data-subview="explore" data-i18n="shared_uxelm_nav_explore"></button>
        <button class="sub-nav-tab" data-subview="bestiary" data-i18n="shared_uxelm_nav_bestiary"></button>
        <button class="sub-nav-tab" data-subview="codex" data-i18n="shared_uxelm_nav_codex"></button>
        <button class="sub-nav-tab" data-subview="chronicle" data-i18n="nav_chronicle"></button>
    </div>
    <div class="explore-header">
        <h2 data-i18n="shared_uxelm_nav_explore"></h2>
        <div id="explore-view-toggle" class="view-toggle">
            <button class="view-btn" data-view-mode="list" title="List View">☰</button>
            <button class="view-btn" data-view-mode="tree" title="Tree View">🌲</button>
        </div>
        <div id="explore-status-banner"></div>
    </div>

    <div class="master-detail-layout">
        <!-- Master Pane: Regions & Expeditions -->
        <aside class="master-pane card">
            <div class="pane-header">
                <h3 data-i18n="explore_uxelm_world_map"></h3>
            </div>
            <div id="regions-list-container" class="list-container">
                <!-- Regions and their nodes injected here -->
            </div>
        </aside>

        <!-- Detail Pane: Node info & Start -->
        <main class="detail-pane card glass-pane">
            <div id="expedition-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">🗺️</div>
                    <p data-i18n="explore_uxelm_select_expedition"></p>
                </div>
            </div>
        </main>
    </div>

    <template id="tpl-region-group">
        <div class="region-group">
            <h4 class="region-title"></h4>
            <div class="region-nodes"></div>
        </div>
    </template>

    <template id="tpl-expedition-node">
        <div class="list-item expedition-card" data-id="">
            <div class="list-item-header">
                <span class="list-item-title"></span>
                <span class="list-item-badge"></span>
            </div>
        </div>
    </template>
</section>
