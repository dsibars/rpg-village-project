<section id="heroes-view" class="domain-view">
    <div class="master-detail-layout">
        <!-- Master Pane -->
        <aside class="master-pane card">
            <div class="pane-header">
                <h3 data-i18n="ui_your_heroes">Your Heroes</h3>
                <button id="btn-recruit-hero" class="btn btn-primary btn-sm" data-i18n="ui_recruit">Recruit</button>
            </div>
            <div id="heroes-list-container" class="list-container">
                <!-- Hero cards injected here -->
            </div>
        </aside>

        <!-- Detail Pane -->
        <main class="detail-pane card glass-pane">
            <div id="hero-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">🦸</div>
                    <p data-i18n="ui_select_hero">Select a hero to view stats and equipment.</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Template for hero card -->
    <template id="tpl-hero-card">
        <div class="list-item hero-card" data-id="">
            <div class="list-item-header">
                <span class="list-item-title"></span>
                <span class="list-item-level"></span>
            </div>
        </div>
    </template>
</section>
