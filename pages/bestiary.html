<section id="bestiary-view" class="domain-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab" data-subview="explore" data-i18n="nav_explore">Explore</button>
        <button class="sub-nav-tab active" data-subview="bestiary" data-i18n="nav_bestiary">Bestiary</button>
        <button class="sub-nav-tab" data-subview="codex" data-i18n="nav_codex">Codex</button>
    </div>
    <div class="card glass-pane" style="padding: 20px; height: 100%; display: flex; flex-direction: column;">
        <div class="pane-header" style="margin-bottom: 15px;">
            <h3 data-i18n="nav_bestiary">Bestiary</h3>
            <span id="bestiary-count" class="hero-level-text" style="margin-left: auto;"></span>
        </div>
        <div id="bestiary-grid" class="bestiary-grid">
            <!-- Enemy cards injected here -->
        </div>
    </div>

    <template id="tpl-bestiary-card">
        <div class="bestiary-card">
            <div class="bestiary-card-header">
                <span class="bestiary-type-badge"></span>
                <span class="bestiary-name"></span>
            </div>
            <div class="bestiary-stats">
                <div class="bestiary-stat"><span data-i18n="ui_stats_hp">HP</span><span class="bestiary-hp"></span></div>
                <div class="bestiary-stat"><span data-i18n="ui_stats_power">STR</span><span class="bestiary-str"></span></div>
                <div class="bestiary-stat"><span data-i18n="ui_stats_defense">DEF</span><span class="bestiary-def"></span></div>
                <div class="bestiary-stat"><span data-i18n="ui_stats_speed">SPD</span><span class="bestiary-spd"></span></div>
            </div>
            <div class="bestiary-element"></div>
        </div>
    </template>
</section>
