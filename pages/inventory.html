<section id="inventory-view" class="domain-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab" data-subview="buildings" data-i18n="shared_uxelm_nav_buildings"></button>
        <button class="sub-nav-tab" data-subview="shop" data-i18n="shared_uxelm_nav_shop"></button>
        <button class="sub-nav-tab" data-subview="forge" data-i18n="shared_uxelm_nav_forge"></button>
        <button class="sub-nav-tab active" data-subview="inventory" data-i18n="shared_uxelm_nav_inventory"></button>
        <button class="sub-nav-tab" data-subview="settings" data-i18n="shared_uxelm_nav_settings"></button>
    </div>
    <!-- Storage Summary Widget -->
    <div class="card storage-summary" style="margin-bottom: var(--spacing-md);">
        <div class="list-item-header">
            <h3 data-i18n="shared_uxelm_storage"></h3>
            <span id="inv-storage-text" class="value">-- / --</span>
        </div>
        <div class="progress-container">
            <div id="inv-storage-bar" class="progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <div class="master-detail-layout">
        <!-- Master Pane: Grid/List of Items -->
        <aside class="master-pane card">
            <!-- Category Tabs / Filters -->
            <div class="inventory-filters">
                <button class="filter-btn active" data-filter="all" data-i18n="inventory_uxelm_filter_all"></button>
                <button class="filter-btn" data-filter="materials" data-i18n="inventory_uxelm_filter_materials"></button>
                <button class="filter-btn" data-filter="food" data-i18n="inventory_uxelm_filter_food"></button>
                <button class="filter-btn" data-filter="consumables" data-i18n="inventory_uxelm_filter_consumables"></button>
                <button class="filter-btn" data-filter="equipment" data-i18n="inventory_uxelm_filter_equipment"></button>
            </div>
            
            <div id="inventory-items-container">
                <!-- Items will be dynamically populated here -->
            </div>
        </aside>

        <!-- Detail Pane: Item Inspection -->
        <main class="detail-pane card glass-pane">
            <div id="inventory-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">🎒</div>
                    <p data-i18n="inventory_uxelm_select_item"></p>
                </div>
            </div>
        </main>
    </div>
</section>
