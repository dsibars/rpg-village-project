<section id="inventory-view" class="domain-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab" data-subview="shop" data-i18n="nav_shop">Shop</button>
        <button class="sub-nav-tab" data-subview="forge" data-i18n="nav_forge">Forge</button>
        <button class="sub-nav-tab active" data-subview="inventory" data-i18n="nav_inventory">Inventory</button>
        <button class="sub-nav-tab" data-subview="settings" data-i18n="nav_settings">Settings</button>
    </div>
    <!-- Storage Summary Widget -->
    <div class="card storage-summary" style="margin-bottom: var(--spacing-md);">
        <div class="list-item-header">
            <h3 data-i18n="inv_storage">Storage</h3>
            <span id="inv-storage-text" class="value">-- / --</span>
        </div>
        <div class="progress-container">
            <div id="inv-storage-bar" class="progress-bar" style="width: 0%"></div>
        </div>
    </div>

    <div class="master-detail-layout">
        <!-- Master Pane: Grid/List of Items -->
        <aside class="master-pane card">
            <!-- Category Tabs / Filters -->
            <div class="inventory-filters">
                <button class="filter-btn active" data-filter="all" data-i18n="ui_all">All</button>
                <button class="filter-btn" data-filter="materials" data-i18n="ui_materials">Materials</button>
                <button class="filter-btn" data-filter="food" data-i18n="ui_food">Food</button>
                <button class="filter-btn" data-filter="consumables" data-i18n="ui_consumables">Consumables</button>
                <button class="filter-btn" data-filter="equipment" data-i18n="ui_equipment">Equipment</button>
            </div>
            
            <div id="inventory-items-container">
                <!-- Items will be dynamically populated here -->
            </div>
        </aside>

        <!-- Detail Pane: Item Inspection -->
        <main class="detail-pane card glass-pane">
            <div id="inventory-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">🎒</div>
                    <p data-i18n="ui_select_item">Select an item to view details.</p>
                </div>
            </div>
        </main>
    </div>
</section>
