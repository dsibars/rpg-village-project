<section class="domain-view forge-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab" data-subview="buildings" data-i18n="shared_uxelm_nav_buildings"></button>
        <button class="sub-nav-tab" data-subview="shop" data-i18n="shared_uxelm_nav_shop"></button>
        <button class="sub-nav-tab active" data-subview="forge" data-i18n="shared_uxelm_nav_forge"></button>
        <button class="sub-nav-tab" data-subview="inventory" data-i18n="shared_uxelm_nav_inventory"></button>
        <button class="sub-nav-tab" data-subview="settings" data-i18n="shared_uxelm_nav_settings"></button>
    </div>
    <!-- Locked -->
    <div class="lock-overlay" id="forge-lock-overlay" style="display: none;">
        <div class="lock-card">
            <span class="lock-icon">🔥</span>
            <h2 data-i18n="forge_uxelm_locked"></h2>
            <p data-i18n="forge_uxelm_locked_desc" style="margin-top: 10px; color: var(--text-secondary);"></p>
        </div>
    </div>

    <!-- Forge Content -->
    <div class="master-detail-layout">
        <!-- Master Pane: List of Items in Inventory -->
        <aside class="master-pane card">
            <h3><span class="icon">🎒</span><span data-i18n="inventory_uxelm_equipment"></span></h3>
            <div id="forge-items-list" class="list-container">
                <!-- Equipment items will be injected here -->
            </div>
        </aside>

        <!-- Detail Pane: Upgrade Information & Actions -->
        <main class="detail-pane card glass-pane">
            <div id="forge-detail-content">
                <div class="empty-detail">
                    <div class="detail-icon-bg">🔥</div>
                    <p data-i18n="forge_uxelm_select_item" style="color: var(--text-muted);"></p>
                </div>
            </div>
        </main>
    </div>
</section>
