<section id="village-view" class="domain-view">
    <div class="dashboard-grid">
        <!-- Combined Header & Status Bar -->
        <div class="village-header-bar card">
            <div class="header-left">
                <h2 data-i18n="shared_uxelm_nav_village" class="village-title"></h2>
                <div class="status-bar-divider"></div>
                <div class="status-bar-item">
                    <span class="status-bar-icon">🏡</span>
                    <span class="status-bar-label" data-i18n="village_info_building_townhall"></span>
                    <span class="status-bar-value"><span data-i18n="shared_uxelm_level_abbrev"></span> <span id="village-townhall-level">--</span></span>
                </div>
            </div>
            <div class="header-center">
                <div class="status-bar-item storage-bar-item">
                    <span class="status-bar-icon">📦</span>
                    <span class="status-bar-label" data-i18n="shared_uxelm_storage"></span>
                    <span id="village-storage-text" class="status-bar-value">-- / --</span>
                    <div class="progress-container">
                        <div id="village-storage-bar" class="progress-bar" style="width: 0%"></div>
                    </div>
                </div>
            </div>
            <div class="header-right">
                <button id="btn-recall-report" class="btn btn-secondary btn-sm recall-report-btn" style="display: none;">
                    <span>📜</span> <span data-i18n="village_uxelm_report_view"></span>
                </button>
            </div>
        </div>

        <!-- 3-Column Layout -->
        <div class="village-dashboard-grid">
            <!-- Column 1: Village Grid Map (Canvas) -->
            <div class="dashboard-column map-column">
                <div id="village-canvas-container">
                    <!-- Dynamic village tiles will be rendered here -->
                </div>
            </div>

            <!-- Column 2: Specialization & Construction -->
            <div class="dashboard-column center-column">
                <!-- Specialization Widget -->
                <div class="card widget roles-widget">
                    <h3 class="roles-title">
                        <span data-i18n="village_uxelm_role"></span>
                        <span id="labor-pool-status" class="title-status-sub"></span>
                    </h3>
                    <div id="role-controls" class="role-controls">
                        <!-- Role rows injected here -->
                    </div>
                </div>

                <!-- Construction Widget -->
                <div class="card widget construction-widget">
                    <h3 data-i18n="village_uxelm_construction"></h3>
                    <div id="construction-list-container">
                        <div id="construction-list" class="empty-state" data-i18n="village_uxelm_project_none"></div>
                    </div>
                </div>
            </div>

            <!-- Column 3: Calendar/Defense & Objectives -->
            <div class="dashboard-column right-column">
                <!-- Calendar & Defense Widget -->
                <div class="card widget calendar-defense-widget">
                    <h3 data-i18n="village_uxelm_defense_calendar"></h3>
                    <div class="calendar-defense-split">
                        <!-- Calendar Section -->
                        <div class="calendar-section">
                            <div class="calendar-header-sub">
                                <span id="calendar-season-icon">🌸</span>
                                <span id="calendar-season-label" class="calendar-season-name">--</span>
                                <span class="calendar-days-counter">(<span id="calendar-day-of-season">--</span>/30)</span>
                            </div>
                            <div id="calendar-events-list">
                                <div class="empty-state" data-i18n="calendar_uxelm_event_none"></div>
                            </div>
                        </div>

                        <!-- Defense Section -->
                        <div class="defense-section">
                            <div class="defense-header-sub">
                                <span>🛡️</span>
                                <span data-i18n="village_uxelm_defender"></span>
                                <span class="defense-count-container">(<span id="defense-count">0</span>/4)</span>
                            </div>
                            <div id="defense-assignments-list">
                                <div class="empty-state" data-i18n="village_uxelm_defender_none"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Daily Objectives Widget -->
                <div class="card widget objectives-widget">
                    <h3 data-i18n="daily_uxelm_objective"></h3>
                    <div id="daily-objectives-list">
                        <div class="empty-state" data-i18n="daily_uxelm_objective_none"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</section>
