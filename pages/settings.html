<section class="domain-view settings-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab" data-subview="buildings" data-i18n="shared_uxelm_nav_buildings"></button>
        <button class="sub-nav-tab" data-subview="shop" data-i18n="shared_uxelm_nav_shop"></button>
        <button class="sub-nav-tab" data-subview="forge" data-i18n="shared_uxelm_nav_forge"></button>
        <button class="sub-nav-tab" data-subview="inventory" data-i18n="shared_uxelm_nav_inventory"></button>
        <button class="sub-nav-tab active" data-subview="settings" data-i18n="shared_uxelm_nav_settings"></button>
    </div>
    <div class="view-header">
        <h2 data-i18n="settings_uxelm_title"></h2>
    </div>

    <div class="dashboard-grid">
        <div class="settings-content">
            <!-- Preferences -->
            <div class="card settings-group">
                <h3 data-i18n="settings_uxelm_language"></h3>
                <div class="settings-body">
                    <label for="lang-select" class="settings-label" data-i18n="settings_language_label"></label>
                    <select id="lang-select" class="select-control">
                        <option value="en">English</option>
                        <option value="es">Español</option>
                        <option value="ca">Català</option>
                        <option value="eu">Euskara</option>
                        <option value="gl">Galego</option>
                    </select>
                </div>
            </div>

            <!-- Current Save Info -->
            <div class="card settings-group">
                <h3 data-i18n="shared_uxelm_save_slot_title"></h3>
                <div class="settings-body">
                    <p class="settings-label" id="settings-current-slot-label">Current Save: Slot 0</p>
                    <button id="btn-return-slots" class="btn btn-secondary btn-lg" style="margin-bottom: 10px;">
                        <span class="icon">💾</span>
                        <span data-i18n="settings_uxelm_return_slots"></span>
                    </button>
                </div>
            </div>

            <!-- Developer Options -->
            <div class="card settings-group">
                <h3 data-i18n="settings_uxelm_dev_options"></h3>
                <div class="settings-body">
                    <p class="settings-label" data-i18n="settings_uxelm_dev_cheat_desc"></p>
                    <button id="btn-dev-cheat" class="btn btn-danger btn-lg" style="background: linear-gradient(135deg, #e74c3c, #c0392b); border: none; box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3); margin-bottom: 15px;">
                        <span class="icon">⚡</span>
                        <span data-i18n="settings_uxelm_dev_cheat"></span>
                    </button>
                    
                    <p class="settings-label" data-i18n="settings_uxelm_magic_simulator_desc"></p>
                    <button id="btn-magic-simulator" class="btn btn-primary btn-lg" style="background: linear-gradient(135deg, #8e44ad, #2c3e50); border: none; box-shadow: 0 4px 10px rgba(142, 68, 173, 0.3);">
                        <span class="icon">🔮</span>
                        <span data-i18n="settings_uxelm_magic_simulator"></span>
                    </button>
                </div>
            </div>

            <!-- Danger Zone -->
            <div class="card danger-zone settings-group">
                <h3 data-i18n="settings_uxelm_danger_zone"></h3>
                <div class="settings-body">
                    <p class="settings-label" data-i18n="settings_uxelm_wipe_slot_confirm"></p>
                    <button id="btn-wipe-slot" class="btn btn-danger btn-lg" style="margin-bottom: 12px;">
                        <span class="icon">🗑️</span>
                        <span data-i18n="settings_uxelm_wipe_slot"></span>
                    </button>

                    <p class="settings-label" data-i18n="settings_uxelm_wipe_all_confirm"></p>
                    <button id="btn-wipe-all" class="btn btn-danger btn-lg">
                        <span class="icon">☠️</span>
                        <span data-i18n="settings_uxelm_wipe_all"></span>
                    </button>
                </div>
            </div>
        </div>
        
        <div class="canvas-widget">
            <div class="card">
                <h3 data-i18n="shared_uxelm_about"></h3>
                <div class="about-content">
                    <p><strong>RPG Village</strong></p>
                    <p><span data-i18n="shared_uxelm_version"></span>: 1.0.0-beta</p>
                    <p data-i18n="shared_uxelm_built_with"></p>
                </div>
            </div>
        </div>
    </div>
</section>
