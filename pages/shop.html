<section class="domain-view shop-view">
    <div class="category-sub-nav">
        <button class="sub-nav-tab active" data-subview="shop" data-i18n="nav_shop">Shop</button>
        <button class="sub-nav-tab" data-subview="forge" data-i18n="nav_forge">Forge</button>
        <button class="sub-nav-tab" data-subview="inventory" data-i18n="nav_inventory">Inventory</button>
        <button class="sub-nav-tab" data-subview="settings" data-i18n="nav_settings">Settings</button>
    </div>
    <!-- Locked Overlay -->
    <div class="lock-overlay" id="shop-lock-overlay" style="display: none;">
        <div class="lock-card">
            <span class="lock-icon">🔒</span>
            <h2 data-i18n="ui_shop_locked">Shop Locked</h2>
            <p data-i18n="ui_shop_locked_desc" style="margin-top: 10px; color: var(--text-secondary);">Complete the Tutorial Cave expedition to unlock the Shop.</p>
        </div>
    </div>

    <!-- Shop Content -->
    <div class="shop-content-wrapper">
        <div class="shop-header-pane">
            <h2 data-i18n="ui_shop_title">Village Shop</h2>
            <p class="subtitle" data-i18n="ui_shop_subtitle" style="color: var(--text-secondary); font-size: 0.95rem; margin-top: 4px;">Purchase supplies, weaponry, and protective gear for your heroes.</p>
            <div class="shop-tabs">
                <button class="shop-tab active" data-tab="buy" data-i18n="ui_buy">Buy</button>
                <button class="shop-tab" data-tab="sell" data-i18n="ui_sell">Sell</button>
                <button class="shop-tab" data-tab="resources" data-i18n="ui_resources">Resources</button>
            </div>
        </div>
        <div class="master-detail-layout">
            <!-- Master Pane: Collapsible Categories and Item List -->
            <aside class="master-pane card">
                <div class="pane-header" style="margin-bottom: var(--spacing-sm);">
                    <h3 data-i18n="ui_shop_catalog">Shop Catalog</h3>
                </div>
                <div id="shop-catalog-container" class="list-container">
                    <!-- Collapsible details and summary lists will be injected here -->
                </div>
            </aside>

            <!-- Detail Pane: Stats, Owned Count & Buy Button -->
            <main class="detail-pane card glass-pane">
                <div id="shop-detail-content">
                    <div class="empty-detail">
                        <div class="detail-icon-bg">🛒</div>
                        <p data-i18n="ui_select_item">Select an item to view details.</p>
                    </div>
                </div>
            </main>
        </div>
    </div>
</section>
