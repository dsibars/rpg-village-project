<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="RPG Village - Build and Manage Your Hero's Home">
  <title>RPG Village</title>
  <!-- Keep legacy global styles for fonts/resets during the transition -->
  <link rel="stylesheet" href="./css/style.css">
</head>
<body>
  <div id="app"></div>
  <script type="module">
    import { createVueApp } from './ux/main.js';
    import { GameEngine } from './js/engine/GameEngine.js';
    import { SaveSlotManager } from './js/engine/shared/core/SaveSlotManager.js';
    import { persistence } from './js/engine/shared/core/Persistence.js';

    const engine = new GameEngine();
    const saveSlotManager = new SaveSlotManager();

    createVueApp({
      engine,
      persistence,
      saveSlotManager,
      container: document.getElementById('app')
    });
  </script>
</body>
</html>
